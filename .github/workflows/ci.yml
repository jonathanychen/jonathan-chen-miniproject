name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle'
      - name: Maven Package
        run: mvn -f IndividualProject/pom.xml -B clean package -DskipTests
      - name: Maven Verify
        run: mvn -f IndividualProject/pom.xml -B clean verify
