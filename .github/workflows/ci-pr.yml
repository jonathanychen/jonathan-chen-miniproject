name: CI

on:
  pull-request:
    branches:
      - main

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-18.04

    steps:
      - uses: actions/checkout@v1
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
      - name: Maven Package
        run: mvn -f IndividualProject/pom.xml -B clean package -DskipTests
      - name: Maven Verify
        run: mvn -f IndividualProject/pom.xml -B clean verify
